{{ define "main" }}
<div class="container">
    <header class="page-header">
        <h1>{{ .Title }}</h1>
        {{ if .Description }}
        <p class="lead">{{ .Description }}</p>
        {{ end }}
    </header>
    
    <div class="content-list">
        {{ range .Pages }}
        <article class="content-item">
            {{ if .Params.image }}
            <div class="content-item-image">
                <a href="{{ .RelPermalink }}"><img src="{{ .Params.image }}" alt="{{ .Title }}" loading="lazy"></a>
            </div>
            {{ end }}
            <div class="content-item-text">
                <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
                {{ if .Date }}
                <time class="date">{{ .Date.Format "2 January 2006" }}</time>
                {{ end }}
                {{ if .Summary }}
                <p>{{ .Summary }}</p>
                {{ end }}
                <a href="{{ .RelPermalink }}" class="read-more">Read more</a>
            </div>
        </article>
        {{ end }}
    </div>
</div>
{{ end }}
