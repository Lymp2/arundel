{{ define "main" }}
<div class="container">
    <article class="single-content">
        <header class="content-header">
            <h1>{{ .Title }}</h1>
            {{ if .Date }}
            <time class="date">{{ .Date.Format "2 January 2006" }}</time>
            {{ end }}
        </header>
        
        <div class="content-body">
            {{ .Content }}
        </div>
        
        {{ if .Params.tags }}
        <footer class="content-footer">
            <div class="tags">
                <strong>Tags:</strong>
                {{ range .Params.tags }}
                <span class="tag">{{ . }}</span>
                {{ end }}
            </div>
        </footer>
        {{ end }}
    </article>
</div>
{{ end }}
