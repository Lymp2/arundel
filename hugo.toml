baseURL = 'https://your-site-name.netlify.app/'
languageCode = 'en-gb'
title = 'Liberal Democrats - Local Division'
theme = 'lybdems-theme'

[params]
  description = "Liberal Democrats - Local Division. Working for a fair, free and open society."
  author = "Liberal Democrats"
  partyColor = "#FDBB30"
  partyBlue = "#003DA5"
  
[menu]
  [[menu.main]]
